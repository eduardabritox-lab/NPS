<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="color-scheme" content="dark" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>NPS Ranking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #0a0a0a !important;
  color-scheme: dark;
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;
}

body {
  font-family: 'DM Sans', sans-serif;
  color: #e8e8e8;
}

:root {
  --border: #1e1e1e;
  --border-dim: #161616;
  --dim: #555;
  --green: #4ade80;
  --gold:   #FFD700;
  --silver: #C0C0C0;
  --bronze: #CD7F32;
}

#app {
  width: 100%;
  padding-top: env(safe-area-inset-top, 20px);
  padding-bottom: env(safe-area-inset-bottom, 40px);
}

/* TABS */
.tabs {
  display: flex;
  background: #0d0d0d;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  padding-top: env(safe-area-inset-top);
}
.tab-btn {
  flex: 1; padding: 13px 0;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--dim); font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

.content { padding: 14px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* CARDS */
.card {
  background: #111; border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 14px;
}
.lbl {
  display: block; font-size: 10px; font-weight: 700; color: var(--dim);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
}
.input-field {
  width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a;
  border-radius: 8px; color: #fff; padding: 11px 12px; margin-bottom: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
}
.input-field option { background: #111; }

.btn-primary {
  width: 100%; background: var(--green); color: #000; border: none;
  border-radius: 8px; padding: 12px; font-family: 'DM Sans', sans-serif;
  font-weight: 700; font-size: 14px; cursor: pointer;
}
.btn-secondary {
  width: 100%; background: #1a2e1a; color: var(--green);
  border: 1px solid #2a4a2a; border-radius: 8px; padding: 12px;
  font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer;
}

/* SCORE BUTTONS */
.score-grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 6px; margin-bottom: 14px;
}
.score-btn {
  padding: 7px 0; border-radius: 7px;
  border: 2px solid transparent;
  font-family: 'DM Mono', monospace;
  font-size: 13px; font-weight: 700;
  cursor: pointer; color: #000; opacity: 0.5;
  transition: transform 0.1s, opacity 0.1s;
}
.score-btn:active { transform: scale(0.93); }
.score-btn.selected { opacity: 1; border-color: rgba(255,255,255,0.35); transform: scale(1.05); }
.score-btn[data-v="1"],.score-btn[data-v="2"],.score-btn[data-v="3"],
.score-btn[data-v="4"],.score-btn[data-v="5"],.score-btn[data-v="6"] { background: #ef4444; color: #fff; }
.score-btn[data-v="7"],.score-btn[data-v="8"] { background: #facc15; color: #111; }
.score-btn[data-v="9"],.score-btn[data-v="10"] { background: var(--green); color: #000; }

/* RANKING */
.ranking-card {
  background: #0d0d0d; border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; margin-bottom: 8px;
}
.ranking-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px; background: #111; border-bottom: 1px solid var(--border);
}
.ranking-head-title { font-size: 13px; font-weight: 700; color: var(--green); }
.ranking-head-month { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim); text-transform: uppercase; }

.last-updated {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: #383838; text-align: right; margin-bottom: 10px; padding-right: 2px;
}
.last-updated span { color: #484848; }

.rank-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 12px; border-bottom: 1px solid var(--border-dim);
  border-left: 3px solid transparent;
}
.rank-row:last-child { border-bottom: none; }
.rank-row.medal-0 { border-left-color: var(--gold);   background: rgba(255,215,0,0.04); }
.rank-row.medal-1 { border-left-color: var(--silver); background: rgba(192,192,192,0.04); }
.rank-row.medal-2 { border-left-color: var(--bronze); background: rgba(205,127,50,0.04); }

.pos {
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700;
  min-width: 26px; color: var(--dim); text-align: center;
}
.pos.medal-0 { color: var(--gold); }
.pos.medal-1 { color: var(--silver); }
.pos.medal-2 { color: var(--bronze); }

.bar-container { flex: 1; min-width: 0; }
.op-info {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 5px; font-size: 13px;
}
.op-name { font-weight: 500; }

/* pontuação — cor espelha a medalha */
.pts-total {
  font-family: 'DM Mono', monospace; font-weight: 700; font-size: 13px; color: #666;
}
.pts-total small { font-size: 9px; margin-left: 1px; color: var(--dim); }
.pts-total.medal-0 { color: var(--gold); }
.pts-total.medal-1 { color: var(--silver); }
.pts-total.medal-2 { color: var(--bronze); }

.bar-bg { height: 5px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

/* CAPTURA */
#capture-area {
  background: #0d0d0d; border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; margin-bottom: 14px;
}
#capture-area .rank-row { padding: 7px 12px; }
#capture-area .op-info { margin-bottom: 3px; font-size: 12px; }
#capture-area .bar-bg { height: 3px; }

.capture-header {
  padding: 12px 16px; background: #111;
  border-bottom: 1px solid var(--border); text-align: center;
}
.capture-title { font-size: 16px; font-weight: 700; color: var(--green); }
.capture-subtitle { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 2px; margin-top: 3px; }
.capture-month-lbl { font-family: 'DM Mono', monospace; font-size: 11px; color: #777; margin-top: 6px; }
.capture-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; background: #0d0d0d; border-top: 1px solid #161616;
}
.capture-brand { font-family: 'DM Mono', monospace; font-size: 9px; color: #333; letter-spacing: 1px; text-transform: uppercase; }
.capture-brand span { color: var(--green); }

/* CONFIG */
.op-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 12px; background: #0d0d0d; border: 1px solid #1e1e1e;
  border-radius: 6px; margin-bottom: 6px; font-size: 13px;
}
.btn-del { background: #2a1010; color: #f87171; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }

/* TOAST */
#toast {
  position: fixed; bottom: 26px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: #1a1a1a; border: 1px solid #2e2e2e; color: #e8e8e8;
  padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600;
  opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s;
  z-index: 999; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div id="toast"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('ranking')">🏆 Ranking</button>
    <button class="tab-btn" onclick="switchTab('lancar')">➕ Lançar</button>
    <button class="tab-btn" onclick="switchTab('captura')">📸 Captura</button>
    <button class="tab-btn" onclick="switchTab('config')">⚙️ Config</button>
  </div>

  <div class="content">

    <!-- RANKING -->
    <div id="tab-ranking" class="tab-panel active">
      <div class="card" style="padding:10px 14px; margin-bottom:10px;">
        <label class="lbl" style="margin-bottom:5px;">Visualizar Mês</label>
        <select id="rank-month" class="input-field" style="margin-bottom:0" onchange="renderRanking()"></select>
      </div>
      <div class="last-updated" id="last-updated"></div>
      <div class="ranking-card">
        <div class="ranking-head">
          <span class="ranking-head-title">📊 PERFORMANCE NPS</span>
          <span class="ranking-head-month" id="display-month"></span>
        </div>
        <div id="ranking-list"></div>
      </div>
    </div>

    <!-- LANÇAR -->
    <div id="tab-lancar" class="tab-panel">
      <div class="card">
        <label class="lbl">Operador</label>
        <select id="select-op" class="input-field"></select>
        <label class="lbl">Data do Atendimento</label>
        <input type="date" id="input-date" class="input-field">
        <label class="lbl">Nota NPS</label>
        <div class="score-grid" id="score-grid"></div>
        <input type="hidden" id="selected-score">
        <button class="btn-primary" onclick="addLaunch()">Salvar e Atualizar ✅</button>
      </div>
    </div>

    <!-- CAPTURA -->
    <div id="tab-captura" class="tab-panel">
      <div class="card" style="padding:10px 14px; margin-bottom:14px;">
        <label class="lbl" style="margin-bottom:5px;">Mês da Captura</label>
        <select id="capture-month-sel" class="input-field" style="margin-bottom:0" onchange="renderCapture()"></select>
      </div>
      <div id="capture-area">
        <div class="capture-header">
          <div class="capture-title">📊 NPS RANKING</div>
          <div class="capture-subtitle">Performance da Equipe</div>
          <div class="capture-month-lbl" id="capture-month-lbl"></div>
        </div>
        <div id="capture-list"></div>
        <div class="capture-footer">
          <span class="capture-brand">NPS SYSTEM <span>BY EDUARDA</span></span>
          <span class="capture-brand" id="capture-date-lbl"></span>
        </div>
      </div>
      <button class="btn-secondary" style="margin-top:14px;" onclick="exportImage()">Salvar imagem para WhatsApp 📲</button>
    </div>

    <!-- CONFIG -->
    <div id="tab-config" class="tab-panel">
      <div class="card">
        <label class="lbl">Novo Operador</label>
        <input type="text" id="new-op-name" class="input-field" placeholder="Nome do operador">
        <button class="btn-primary" onclick="addOperator()">Adicionar à Lista +</button>
      </div>
      <label class="lbl">Lista de Operadores</label>
      <div id="manage-ops-list"></div>
    </div>

  </div>
</div>

<script>
const K_OPS     = "nps_ops_v8";
const K_DATA    = "nps_data_v8";
const K_UPDATED = "nps_updated_v8";

const OPERATORS = [
  "Liz","Natália","Carolina","Alef","Davi","Daniele",
  "Michele","Sunamita","Blenda","Fernanda","Lucas",
  "Eduarda","Kaio","Patrícia"
];

// Pontos de março pré-carregados como lançamentos reais
// Cada ponto = 1 avaliação com nota 10 na data 2026-03-26
const MARCH_SCORES = {
  "Liz": 42, "Natália": 21, "Carolina": 15, "Alef": 15,
  "Davi": 14, "Daniele": 13, "Michele": 13, "Sunamita": 12,
  "Blenda": 11, "Fernanda": 9, "Lucas": 8, "Eduarda": 6,
  "Kaio": 3, "Patrícia": 1
};

function seedMarch(launches) {
  // Verifica se março já foi semeado
  const already = launches.some(l => l.date === "2026-03-26" && l._seed);
  if (already) return launches;
  const seeds = [];
  for (const [name, pts] of Object.entries(MARCH_SCORES)) {
    for (let i = 0; i < pts; i++) {
      seeds.push({ name, date: "2026-03-26", score: 10, _seed: true });
    }
  }
  return [...launches, ...seeds];
}

let operators  = JSON.parse(localStorage.getItem(K_OPS))  || OPERATORS;
let launches   = JSON.parse(localStorage.getItem(K_DATA)) || [];
let lastUpdate = localStorage.getItem(K_UPDATED)          || null;

// Semeia março se necessário
launches = seedMarch(launches);
localStorage.setItem(K_DATA, JSON.stringify(launches));

// ── INIT ──────────────────────────────────────────────────────────────────

function init() {
  const grid = document.getElementById('score-grid');
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.className   = 'score-btn';
    btn.dataset.v   = i;
    btn.textContent = i;
    btn.type        = 'button';
    // cor inline — não depende de CSS
    if (i <= 6)       { btn.style.background = '#ef4444'; btn.style.color = '#fff'; }
    else if (i <= 8)  { btn.style.background = '#ca8a04'; btn.style.color = '#fff'; }
    else              { btn.style.background = '#16a34a'; btn.style.color = '#fff'; }
    btn.onclick = () => selectScore(i, btn);
    grid.appendChild(btn);
  }
  populateMonths('rank-month');
  populateMonths('capture-month-sel');
  document.getElementById('input-date').value = new Date().toISOString().slice(0, 10);
  renderAll();
}

function populateMonths(id) {
  const sel = document.getElementById(id);
  const now = new Date();
  sel.innerHTML = "";
  for (let i = 0; i < 12; i++) {
    const d   = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const val = d.toISOString().slice(0, 7);
    const txt = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    sel.innerHTML += `<option value="${val}">${txt}</option>`;
  }
}

function selectScore(val, btn) {
  document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('selected-score').value = val;
}

// ── DADOS ─────────────────────────────────────────────────────────────────

function save() {
  localStorage.setItem(K_OPS,  JSON.stringify(operators));
  localStorage.setItem(K_DATA, JSON.stringify(launches));
  lastUpdate = new Date().toLocaleString('pt-BR', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
  localStorage.setItem(K_UPDATED, lastUpdate);
}

// Cada mês é ciclo independente
function buildRank(month) {
  const scoreMap = {};
  launches
    .filter(l => l.date.startsWith(month))
    .forEach(l => {
      if (l.score >= 9) scoreMap[l.name] = (scoreMap[l.name] || 0) + 1;
    });
  return operators
    .map(name => ({ name, total: scoreMap[name] || 0 }))
    .sort((a, b) => b.total - a.total);
}

// ── RENDER ────────────────────────────────────────────────────────────────

function renderAll() {
  renderOpSelectors();
  renderRanking();
  renderCapture();
  renderConfigOps();
}

function rowHTML(op, i, rank) {
  const max        = rank[0]?.total || 1;
  const pct        = max > 0 ? (op.total / max) * 100 : 0;
  const medalClass = i < 3 && op.total > 0 ? `medal-${i}` : '';
  const emoji      = op.total > 0 ? (['🥇','🥈','🥉'][i] ?? `${i+1}º`) : `${i+1}º`;
  const ptsClass   = medalClass || '';

  return `
    <div class="rank-row ${medalClass}">
      <div class="pos ${medalClass}">${emoji}</div>
      <div class="bar-container">
        <div class="op-info">
          <div class="op-name">${op.name}</div>
          <span class="pts-total ${ptsClass}">${op.total}<small>PTS</small></span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%; background:${i===0&&op.total>0?'#FFD700':i===1&&op.total>0?'#C0C0C0':i===2&&op.total>0?'#CD7F32':'#4ade80'}"></div></div>
      </div>
    </div>`;
}

function renderRanking() {
  const month = document.getElementById('rank-month').value;
  document.getElementById('display-month').innerText = month;
  const lu = document.getElementById('last-updated');
  lu.innerHTML = lastUpdate ? `atualizado em <span>${lastUpdate}</span>` : '';
  const rank = buildRank(month);
  document.getElementById('ranking-list').innerHTML =
    rank.map((op, i) => rowHTML(op, i, rank)).join('');
}

function renderCapture() {
  const month = document.getElementById('capture-month-sel').value;
  const rank  = buildRank(month);
  document.getElementById('capture-list').innerHTML =
    rank.map((op, i) => rowHTML(op, i, rank)).join('');
  const label = new Date(month + '-02')
    .toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();
  document.getElementById('capture-month-lbl').innerText = label;
  document.getElementById('capture-date-lbl').innerText  = new Date().toLocaleDateString('pt-BR');
}

function renderOpSelectors() {
  const sorted = [...operators].sort((a, b) => a.localeCompare(b));
  document.getElementById('select-op').innerHTML =
    sorted.map(name => `<option value="${name}">${name}</option>`).join('');
}

function renderConfigOps() {
  document.getElementById('manage-ops-list').innerHTML = operators.map((name, i) => `
    <div class="op-item">
      <span>${name}</span>
      <button class="btn-del" onclick="deleteOp(${i})">Remover</button>
    </div>`).join('');
}

// ── AÇÕES ─────────────────────────────────────────────────────────────────

function addLaunch() {
  const name  = document.getElementById('select-op').value;
  const date  = document.getElementById('input-date').value;
  const score = document.getElementById('selected-score').value;
  if (!score) return alert("Selecione uma nota");
  launches.push({ name, date, score: parseInt(score) });
  save();
  document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('selected-score').value = '';
  showToast("✅ Salvo!");
  renderRanking();
  renderCapture();
  switchTab('ranking');
}

function addOperator() {
  const name = document.getElementById('new-op-name').value.trim();
  if (!name) return alert("Digite o nome");
  operators.push(name);
  save();
  document.getElementById('new-op-name').value = "";
  renderAll();
  showToast("Operador adicionado!");
}

function deleteOp(index) {
  if (confirm("Remover este operador?")) {
    operators.splice(index, 1);
    save();
    renderAll();
  }
}

// ── EXPORT ────────────────────────────────────────────────────────────────

async function exportImage() {
  showToast("Gerando imagem...");
  try {
    const canvas = await html2canvas(document.getElementById('capture-area'), {
      backgroundColor: "#0d0d0d", scale: 2.5, useCORS: true, logging: false
    });
    const month = document.getElementById('capture-month-sel').value;
    if (navigator.canShare) {
      canvas.toBlob(async blob => {
        const file = new File([blob], `nps-ranking-${month}.png`, { type: 'image/png' });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: 'NPS Ranking' });
          showToast("Compartilhado! 🎉");
          return;
        }
        download(canvas, month);
      }, 'image/png');
    } else {
      download(canvas, month);
    }
  } catch(e) { showToast("Erro ao gerar imagem"); }
}

function download(canvas, month) {
  const a = document.createElement('a');
  a.download = `nps-ranking-${month}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
  showToast("Imagem salva! 📸");
}

// ── UI ────────────────────────────────────────────────────────────────────

function switchTab(t) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  document.querySelectorAll('.tab-btn')[{ranking:0,lancar:1,captura:2,config:3}[t]].classList.add('active');
  if (t === 'ranking') renderRanking();
  if (t === 'captura') renderCapture();
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
