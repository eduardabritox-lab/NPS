<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NPS Ranking</title>

<style>
body {
  background: #0d0d0d;
  color: #fff;
  font-family: sans-serif;
  padding: 20px;
}
button { margin: 5px; padding: 8px; }
</style>
</head>

<body>

<h2 id="month"></h2>

<button onclick="changeMonth(-1)">◀</button>
<button onclick="changeMonth(1)">▶</button>

<h3 id="count"></h3>

<div id="ranking"></div>

<br>

<input id="name" placeholder="Nome" />
<input id="score" type="number" placeholder="Nota 0-10" />
<button onclick="add()">Adicionar</button>

<script>
const STORAGE_KEY = "nps_launches_v2";
let launches = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

let currentDate = new Date();

function formatMonth(date) {
  return date.toLocaleDateString("pt-BR", {
    month: "long",
    year: "numeric"
  });
}

function changeMonth(dir) {
  currentDate.setMonth(currentDate.getMonth() + dir);
  render();
}

function getLaunchesByMonth() {
  return launches.filter(l => {
    const d = new Date(l.date);
    return d.getMonth() === currentDate.getMonth() &&
           d.getFullYear() === currentDate.getFullYear();
  });
}

function add() {
  const name = document.getElementById("name").value;
  const score = Number(document.getElementById("score").value);

  if (!name || isNaN(score)) return alert("Preencha tudo");

  launches.push({
    id: Date.now(),
    name,
    score,
    scored: score >= 8,
    date: new Date(currentDate).toISOString()
  });

  localStorage.setItem(STORAGE_KEY, JSON.stringify(launches));

  render();
}

function buildRanking() {
  const pts = {};
  getLaunchesByMonth().forEach(l => {
    if (l.scored) pts[l.name] = (pts[l.name] || 0) + 1;
  });
  return pts;
}

function render() {
  document.getElementById("month").textContent = formatMonth(currentDate);

  const data = getLaunchesByMonth();
  document.getElementById("count").textContent =
    data.length + " lançamentos";

  document.getElementById("ranking").innerHTML =
    "<pre>" + JSON.stringify(buildRanking(), null, 2) + "</pre>";
}

render();
</script>

</body>
</html>
