<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="color-scheme" content="dark" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>NPS Ranking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #0a0a0a !important; color-scheme: dark; width: 100%; min-height: 100vh; }
body { font-family: 'DM Sans', sans-serif; color: #e8e8e8; }
#app { width: 100%; padding-bottom: 40px; }
.tabs { display: flex; background: #0d0d0d; border-bottom: 1px solid #1e1e1e; position: sticky; top: 0; z-index: 100; }
.tab-btn { flex: 1; padding: 13px 0; background: none; border: none; border-bottom: 2px solid transparent; color: #555; font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; cursor: pointer; }
.tab-btn.active { color: #4ade80; border-bottom-color: #4ade80; }
.content { padding: 14px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.card { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
.lbl { display: block; font-size: 10px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.input-field { width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; padding: 11px 12px; margin-bottom: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
.input-field option { background: #111; }
.btn-primary { width: 100%; background: #4ade80; color: #000; border: none; border-radius: 8px; padding: 12px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; }
.btn-secondary { width: 100%; background: #1a2e1a; color: #4ade80; border: 1px solid #2a4a2a; border-radius: 8px; padding: 12px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; }
.score-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 14px; }
.score-btn { padding: 7px 0; border-radius: 7px; border: 2px solid transparent; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700; cursor: pointer; opacity: 0.6; transition: transform 0.1s, opacity 0.1s; }
.score-btn.selected { opacity: 1; border-color: rgba(255,255,255,0.35); transform: scale(1.05); }
.ranking-card { background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
.ranking-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: #111; border-bottom: 1px solid #1e1e1e; }
.ranking-head-title { font-size: 13px; font-weight: 700; color: #4ade80; }
.ranking-head-month { font-family: 'DM Mono', monospace; font-size: 10px; color: #555; text-transform: uppercase; }
.last-updated { font-family: 'DM Mono', monospace; font-size: 10px; color: #383838; text-align: right; margin-bottom: 10px; }
.last-updated span { color: #484848; }
.rank-row { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-bottom: 1px solid #161616; border-left: 3px solid transparent; }
.rank-row:last-child { border-bottom: none; }
.rank-row.medal-0 { border-left-color: #FFD700; background: rgba(255,215,0,0.04); }
.rank-row.medal-1 { border-left-color: #C0C0C0; background: rgba(192,192,192,0.04); }
.rank-row.medal-2 { border-left-color: #CD7F32; background: rgba(205,127,50,0.04); }
.pos { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700; min-width: 26px; color: #555; text-align: center; }
.pos.medal-0 { color: #FFD700; }
.pos.medal-1 { color: #C0C0C0; }
.pos.medal-2 { color: #CD7F32; }
.bar-container { flex: 1; min-width: 0; }
.op-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 13px; }
.op-name { font-weight: 500; }
.pts-total { font-family: 'DM Mono', monospace; font-weight: 700; font-size: 13px; color: #666; }
.pts-total small { font-size: 9px; margin-left: 1px; color: #555; }
.pts-total.medal-0 { color: #FFD700; }
.pts-total.medal-1 { color: #C0C0C0; }
.pts-total.medal-2 { color: #CD7F32; }
.bar-bg { height: 5px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
#capture-area { background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
#capture-area .rank-row { padding: 7px 12px; }
#capture-area .op-info { margin-bottom: 3px; font-size: 12px; }
#capture-area .bar-bg { height: 3px; }
.capture-header { padding: 12px 16px; background: #111; border-bottom: 1px solid #1e1e1e; text-align: center; }
.capture-title { font-size: 16px; font-weight: 700; color: #4ade80; }
.capture-subtitle { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-top: 3px; }
.capture-month-lbl { font-family: 'DM Mono', monospace; font-size: 11px; color: #777; margin-top: 6px; }
.capture-footer { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #0d0d0d; border-top: 1px solid #161616; }
.capture-brand { font-family: 'DM Mono', monospace; font-size: 9px; color: #333; letter-spacing: 1px; text-transform: uppercase; }
.capture-brand span { color: #4ade80; }
.op-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
.btn-del { background: #2a1010; color: #f87171; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }
#toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(14px); background: #1a1a1a; border: 1px solid #2e2e2e; color: #e8e8e8; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 999; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
<div id="toast"></div>
<div class="tabs">
<button class="tab-btn active" onclick="switchTab('ranking')">🏆 Ranking</button>
<button class="tab-btn" onclick="switchTab('lancar')">➕ Lançar</button>
<button class="tab-btn" onclick="switchTab('captura')">📸 Captura</button>
<button class="tab-btn" onclick="switchTab('config')">⚙️ Config</button>
</div>
<div class="content">
<div id="tab-ranking" class="tab-panel active">
<div class="card" style="padding:10px 14px; margin-bottom:10px;">
<label class="lbl" style="margin-bottom:5px;">Visualizar Mês</label>
<select id="rank-month" class="input-field" style="margin-bottom:0" onchange="renderRanking()"></select>
</div>
<div class="last-updated" id="last-updated"></div>
<div class="ranking-card">
<div class="ranking-head">
<span class="ranking-head-title">📊 PERFORMANCE NPS</span>
<span class="ranking-head-month" id="display-month"></span>
</div>
<div id="ranking-list"></div>
</div>
</div>
<div id="tab-lancar" class="tab-panel">
<div class="card">
<label class="lbl">Operador</label>
<select id="select-op" class="input-field"></select>
<label class="lbl">Data do Atendimento</label>
<input type="date" id="input-date" class="input-field">
<label class="lbl">Nota NPS</label>
<div class="score-grid" id="score-grid"></div>
<input type="hidden" id="selected-score">
<button class="btn-primary" onclick="addLaunch()">Salvar e Atualizar ✅</button>
</div>
</div>
<div id="tab-captura" class="tab-panel">
<div class="card" style="padding:10px 14px; margin-bottom:14px;">
<label class="lbl" style="margin-bottom:5px;">Mês da Captura</label>
<select id="capture-month-sel" class="input-field" style="margin-bottom:0" onchange="renderCapture()"></select>
</div>
<div id="capture-area">
<div class="capture-header">
<div class="capture-title">📊 NPS RANKING</div>
<div class="capture-subtitle">Performance da Equipe</div>
<div class="capture-month-lbl" id="capture-month-lbl"></div>
</div>
<div id="capture-list"></div>
<div class="capture-footer">
<span class="capture-brand">NPS SYSTEM <span>BY EDUARDA</span></span>
<span class="capture-brand" id="capture-date-lbl"></span>
</div>
</div>
<button class="btn-secondary" style="margin-top:14px;" onclick="exportImage()">Salvar imagem para WhatsApp 📲</button>
</div>
<div id="tab-config" class="tab-panel">
<div class="card">
<label class="lbl">Novo Operador</label>
<input type="text" id="new-op-name" class="input-field" placeholder="Nome do operador">
<button class="btn-primary" onclick="addOperator()">Adicionar à Lista +</button>
</div>
<label class="lbl">Lista de Operadores</label>
<div id="manage-ops-list"></div>
</div>
</div>
</div>
<script>
const K_OPS="nps_ops_v8",​​​​​​​​​​​​​​​​
